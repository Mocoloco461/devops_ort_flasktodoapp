name: Docker Test Server CI
on:
  push:
    branches:
      - main

jobs:
  run-docker-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run Test Server and Check Logs
        run: |
          # הפעלת כל השירותים ב-docker compose
          docker compose -f docker-compose-testserver.yml up -d
          
          # מציאת השם האמיתי של הקונטיינר של שירות ה-app
          CONTAINER_NAME=$(docker compose -f docker-compose-testserver.yml ps -q app)
          
          LOG_FILE="docker.log"
          ACTOR=$GITHUB_ACTOR
          
          echo "Waiting for container to start..."
          
          ATTEMPTS=0
          while [ $ATTEMPTS -lt 30 ]; do
            if docker ps --filter "name=$CONTAINER_NAME" --filter "status=running" | grep -q $CONTAINER_NAME; then
              echo "Container $CONTAINER_NAME is running."
              break
            fi
            sleep 2
            ATTEMPTS=$((ATTEMPTS+1))
          done
          
          if [ $ATTEMPTS -eq 30 ]; then
            echo "$(date '+%Y-%m-%d %H:%M:%S') | $ACTOR | Container failed to start" >> $LOG_FILE
            echo "Container failed to start."
            exit 1
          fi
          
          echo "Waiting for test to complete..."
          
          # המתנה שהבדיקה בקונטיינר server_test תסתיים
          TEST_CONTAINER_NAME=$(docker compose -f docker-compose-testserver.yml ps -q server_test)
          if ! docker wait $TEST_CONTAINER_NAME; then
            echo "Test container exited with an error."
          fi

          # בדיקת הלוגים של קונטיינר הבדיקה (server_test)
          LOG=$(docker logs $TEST_CONTAINER_NAME 2>&1)
          SUCCESS=true
          if echo "$LOG" | grep -q "Error: not working"; then
            SUCCESS=false
          fi
          
          if [ "$SUCCESS" = true ]; then
            echo "$(date '+%Y-%m-%d %H:%M:%S') | $ACTOR | Test Passed" >> $LOG_FILE
            echo "Test Passed ✅"
          else
            echo "$(date '+%Y-%m-%d %H:%M:%S') | $ACTOR | Test Failed" >> $LOG_FILE
            echo "Test Failed ❌"
            exit 1
          fi
